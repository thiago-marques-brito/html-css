<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de notas</title>

    <style>
     body{
        font-family: Arial, Helvetica,sans-serif;  
    }

    table{
        border-collapse: collapse;
        width:300px;
    }

    td, th{
        border: 1px solid grey;
        padding: 10px;
        text-align: center;
        
    }

    tr{
        padding: 2px;
        border: 20px;


    }

    .color{
        background-color: grey;
        color: white;
    }
    </style>
</head>

<body>
    <table>

        <thead>

            <tr class="color">
                <th rowspan="2">Área</th>
                <th rowspan="2">Disciplina</th>
                <th colspan="2">Notas</th>
                <th rowspan="2">Média</th>
                <tr class="color">
                    <td>Nota1</td>
                    <td>Nota2</td>
                </tr>
        
            </tr>

        </thead>


        <tbody>

            <tr>
                <td rowspan="4">Exatas</td>
                <td >Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td >Fisica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td >Quimica</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td >Biologia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
               <th class="color" colspan="4">Média de exatas</th>
               <th class="color">0.0</th>
            </tr>

            <tr>
                <td rowspan="2">Humanas</td>
                <td>História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
                <td>Geografia</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>

            <tr>
               <th class="color" colspan="4">Média de exatas</th>
               <td class="color">0.0</td>
            </tr>


        </tbody>

    </table>


</html>
