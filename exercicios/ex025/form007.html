<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário</title>
</head>
<body>
    
     <h1>Exemplo</h1>

    <form action="cadastro.php" method="post" autocomplete="on">

        <p>
            <label for="iest">Estado:</label>

            <select name="estado" id="iest">

                <optgroup label="Regiao Sudeste">

                    <option value="SP" selected>São Paulo</option>

                    <option value="RJ">Rio de Janeiro</option>

                    <option value="MG">Minas Gerais</option>

                </optgroup>

                <optgroup label="Regiao Nordeste">

                    <option value="RN">Rio Grande do Norte</option>

                    <option value="PE">Pernanbuco</option>

                </optgroup>

            </select>
        </p>

        <p>
            <label for="iprof">Profissão</label>
            <input type="text" name="prof" id="iprof" list="lstprof">

            <datalist id="lstprof">
                <option value="ADM">administrador</option>

                <option value="CONT">Contador</option>

                <option value="DEV">Desenvolvedor </option>

                <option value="PROF">Professor </option>


            </datalist>
        </p>

        <p>
            <label for="imsg">Mensagem</label>
            <textarea name="msg" id="imsg" cols="30" rows="10" placeholder="mensagem:"></textarea>
        </p>
        
         <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

<body>
</html>
