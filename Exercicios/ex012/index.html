<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>

    <h1>Inserindo vídeos hospedados localmente</h1>

    <p>Este vídeo está hospedado no meu própro servidor</p>

    <video width="560" poster="imagem/foto-carro.jpg.jpg "  controls autoplay loop
    >

        <source src="midia/Meu-Video.Mp4.mp4" type="video/mp4">

        <source src="midia/Meu-Video.webm.webm" type="video/webm">
<!--tipos são ; MP4,WEBM,M4V,OGV -->
        <p>Seu navegador não tem compatibilidade com reprodução de videos.</p>
    </video>

    <h1>Inserindo vídeos do youtube </h1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/3hng-hmSv2Y?si=3Y89yWSJiCCWnIL-" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Inserindo vídeos do vimeo</h1>

    <iframe title="vimeo-player" src="https://player.vimeo.com/video/404632420?h=58879c8a68" width="640" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>
</body>
</html>
