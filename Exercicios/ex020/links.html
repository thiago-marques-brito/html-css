<!DOCTYPE html>
<html lang="pt-br"
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>

    <style>
        body{font-family: Arial, Helvetica, sans-serif;}

        a{color: tan;
          text-decoration: none;
          font-weight: bold;

        }

        a:visit{
            color: blue;
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: yellow;
        }


        .especial{background-color: yellow;}

        .especial::before{content: '=>';}

        .especial::after{ content: '<=';}



        
    </style>
</head>

<body>

    <h1>Personalizando Links</h1>
<ul>
    <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio do Github</a></li>

    <li><a href="https://youtube.com/cursoemvideo/" target="_blank" class="especial">Canal do Youtube</a></li>
    
    <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em Video</a></li>

</ul>
    
</html>
